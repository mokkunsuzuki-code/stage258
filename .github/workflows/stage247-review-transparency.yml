name: stage247-review-transparency

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  review-transparency:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cryptography pytest

      - name: Ensure scripts are executable
        run: |
          chmod +x tools/build_review_log.py
          chmod +x tools/verify_review_log.py
          chmod +x tools/run_stage247_review_transparency.sh

      - name: Run Stage247 review transparency
        run: |
          ./tools/run_stage247_review_transparency.sh

      - name: Run tests
        run: |
          pytest -q

      - name: Show generated artifacts
        run: |
          echo "=== out/review_log ==="
          find out/review_log -maxdepth 1 -type f | sort || true
          echo "=== review_records ==="
          find review_records -maxdepth 1 -type f | sort || true
