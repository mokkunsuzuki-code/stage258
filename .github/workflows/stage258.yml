name: stage258-external-anchor

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-anchor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Stage258 external anchor
        run: |
          chmod +x tools/run_stage258_external_anchor.sh
          ./tools/run_stage258_external_anchor.sh

      - name: Show manifest
        run: |
          cat out/anchors/stage258_chain_anchor_manifest.json

      - name: Upload Stage258 anchor artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stage258-external-anchor
          path: |
            out/third_party_chain
            out/anchors
